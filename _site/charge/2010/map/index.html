<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elephant Charge Results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="container-fluid site-header">
    <nav>
      <ul>
        <li>
          <a href="/" class="site-brand">
            <img src="/ec-logo.png" alt="Elephant Charge" class="site-logo">
            <span class="site-title">
              Elephant Charge
              <span>Results Archive</span>
            </span>
          </a>
        </li>
      </ul>
      <ul>
        <li><a href="/">Charges</a></li>
        <li><a href="/teams/">Teams</a></li>
        <li><a href="/cars/">Cars</a></li>
        <li><a href="/beneficiaries/">Beneficiaries</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    
<section class="charge-header" style="margin-bottom:0.75rem">
  <p class="charge-meta"><a href="/charge/2010/">← Elephant Charge 2010</a></p>
  <h2 style="margin-bottom:0.5rem">GPS Tracks — 2010</h2>

  <nav class="page-tabs">
    <a href="/charge/2010/">Results</a>
    <a href="/charge/2010/checkpoints/">Checkpoints</a>
    <a href="/charge/2010/awards/">Awards</a>
    
    <a href="/charge/2010/grants/">Grants</a>
    
    <a href="/charge/2010/map/" class="active">🗺 Map</a>
  </nav>
</section>

<div id="map-legend" class="map-legend" aria-label="Track legend">
  <span class="muted small">Loading tracks…</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  var chargeRef = '2010';
  var centerLat = -15.837816783;
  var centerLng = 28.615112746;

  var map = L.map('map').setView([centerLat, centerLng], 11);

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18,
  }).addTo(map);

  fetch('/data/tracks/' + chargeRef + '.geojson')
    .then(function (r) {
      if (!r.ok) throw new Error('tracks not found');
      return r.json();
    })
    .then(function (data) {
      if (!data.features || data.features.length === 0) {
        document.getElementById('map-legend').textContent = 'No GPS track data for this charge.';
        return;
      }

      var geoLayer = L.geoJSON(data, {
        style: function (feature) {
          return {
            color: feature.properties.color || '#888',
            weight: 2.5,
            opacity: 0.75,
          };
        },
        onEachFeature: function (feature, layer) {
          var p = feature.properties;
          var km = p.distance_total_competition != null
            ? (p.distance_total_competition / 1000).toFixed(1) + ' km'
            : '—';
          var net = p.distance_net != null
            ? (p.distance_net / 1000).toFixed(1) + ' km net'
            : '';
          layer.bindPopup(
            '<strong>Car ' + p.car_no + ' – ' + p.entry_name + '</strong><br>' +
            (p.team_name || '') + '<br>' +
            (p.result_status || '') + '<br>' +
            km + (net ? ' / ' + net : '')
          );
          layer.on('mouseover', function () { layer.setStyle({ weight: 4, opacity: 1 }); });
          layer.on('mouseout',  function () { geoLayer.resetStyle(layer); });
        },
      }).addTo(map);

      map.fitBounds(geoLayer.getBounds(), { padding: [20, 20] });

      // Build legend
      var legendEl = document.getElementById('map-legend');
      legendEl.innerHTML = '';
      data.features.forEach(function (f) {
        var p = f.properties;
        var item = document.createElement('span');
        item.className = 'map-legend-item';
        item.innerHTML =
          '<span class="team-dot" style="background:' + (p.color || '#888') + '"></span>' +
          p.car_no + ' ' + p.entry_name;
        legendEl.appendChild(item);
      });
    })
    .catch(function (err) {
      document.getElementById('map-legend').textContent = 'GPS tracks not available for this charge.';
      console.warn(err);
    });
})();
</script>

  </main>

  <footer class="container-fluid site-footer">
    <small>
      Elephant Charge results archive &mdash; data updated annually after each event.<br>
      <a href="https://elephantcharge.org/" target="_blank" rel="noopener">elephantcharge.org</a>
    </small>
  </footer>
</body>
</html>
